[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
solc     = "0.8.26"
optimizer        = true
optimizer_runs   = 200
via_ir           = false

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
mantle_mainnet = "${MANTLE_RPC_MAINNET}"
mantle_testnet = "${MANTLE_RPC_TESTNET}"

[etherscan]
mantle_mainnet = { key = "${MANTLE_EXPLORER_KEY}", url = "https://explorer.mantle.xyz/api" }
mantle_testnet = { key = "${MANTLE_EXPLORER_KEY}", url = "https://explorer.testnet.mantle.xyz/api" }

[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true
